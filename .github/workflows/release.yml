name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Install CGO dependencies (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libx11-dev libxtst-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        shell: bash
        run: |
          mkdir -p dist
          output="clipboard-tui-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output="${output}.exe"
          fi
          version="${GITHUB_REF_NAME#v}"
          go build -ldflags "-s -w -X github.com/yourname/clipboard-tui/internal/version.Version=${version}" \
            -o "dist/${output}" ./cmd/clipboard-tui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipboard-tui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: clipboard-tui-*
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name 'clipboard-tui-*' ! -name '*.sha256' \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create checksums
        run: |
          cd release-assets
          for file in clipboard-tui-*; do
            [ -f "$file" ] || continue
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Clipboard TUI ${{ github.ref_name }}
          body: |
            ## Changes

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md).

            ## Assets

            | Platform | Binary |
            |----------|--------|
            | Linux (amd64) | `clipboard-tui-linux-amd64` |
            | macOS (amd64) | `clipboard-tui-darwin-amd64` |
            | macOS (arm64) | `clipboard-tui-darwin-arm64` |
            | Windows (amd64) | `clipboard-tui-windows-amd64.exe` |

            SHA256 checksum files (`.sha256`) are included for each binary.
          files: release-assets/*
          generate_release_notes: true
